[platformio]
; This tells the IDE: "When I hit Upload, only build the main program."
default_envs = m5stack-stamps3

; ---------------------------------------------------------
; 1. THE MAIN PROGRAM (What runs when you hit Upload)
; ---------------------------------------------------------

[env:m5stack-stamps3]
platform = espressif32
board = m5stack-stamps3
framework = arduino

lib_deps = 
    m5stack/M5Unified@^0.2.13
    m5stack/M5Cardputer@^1.1.1
    tanakamasayuki/EspHttpServer@^1.0.1

build_flags = 
    -std=gnu++17
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0 
    -D USB_PRODUCT='"BYTEBED"'
build_unflags = 
    -std=gnu++11
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ---------------------------------------------------------
; 2. THE LIGHTNING-FAST MATH TESTER (Runs on your Mac/PC)
; ---------------------------------------------------------
[env:native]
platform = native
test_build_src = yes
build_src_filter = +<*> -<main.cpp> -<state.cpp> -<ui.cpp> -<captive.cpp> -<ble_keyboard.cpp> -<usb_midi_handler.cpp>
build_flags = 
    -D NATIVE_BUILD
    -I wasm
    -std=c++11
test_filter = test_native

; ---------------------------------------------------------
; 3. THE HARDWARE TESTER (Runs tests directly on the ESP32)
; ---------------------------------------------------------
[env:cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino
lib_deps = 
    m5stack/M5Unified@^0.2.13
    m5stack/M5Cardputer@^1.1.1
test_speed = 115200
test_filter = test_esp32