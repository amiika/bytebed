[platformio]
default_envs = m5stack-stamps3

[env:m5stack-stamps3]
platform = espressif32
board = m5stack-stamps3
framework = arduino

lib_deps = 
    m5stack/M5Unified@^0.2.13
    m5stack/M5Cardputer@^1.1.1

build_flags = 
    -std=gnu++17
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0 
    -D USB_PRODUCT='"BYTEBED"'
build_unflags = 
    -std=gnu++11
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

[env:native]
platform = native
test_build_src = yes
build_src_filter = +<*> -<main.cpp> -<ui.cpp> -<usb_midi_handler.cpp>
build_flags = 
    -D NATIVE_BUILD
    -D UNITY_INCLUDE_CONFIG_H
    -I wasm
    -std=c++17
test_filter = test_native

[env:cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino
lib_deps = 
    m5stack/M5Unified@^0.2.13
    m5stack/M5Cardputer@^1.1.1
test_speed = 115200
test_filter = test_esp32