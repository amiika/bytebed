<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytebed</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bytesized&family=Jersey+10&family=Micro+5&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #050505; color: #00ff00; font-family: 'Courier New', monospace; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
        }
        
        #container { 
            width: 95%;
            max-width: 1000px;
            height: 90vh; 
            background: #000; 
            border: 1px solid #111; border-radius: 4px; 
            display: flex; flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        #header { 
            display: flex; 
            flex-direction: column;
            gap: 15px;
            padding: 15px; 
            border-bottom: 1px solid #111; 
            background: #050505; 
        }
        
        .meta { 
            font-family: 'Bytesized', sans-serif; 
            font-size: 28px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            opacity: 0.9; 
            margin: 0; 
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
        }
        
        .controls { 
            font-family: 'VT323', sans-serif; 
            display: flex; 
            gap: 6px; 
            font-size: 16px; 
            align-items: center; 
            overflow-x: auto; 
            padding-bottom: 5px; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .controls::-webkit-scrollbar { display: none; } 
        
        #viz-wrapper { 
            flex-grow: 1; position: relative; background: #000; overflow: hidden; cursor: crosshair; touch-action: none; min-height: 100px;
        }
        
        canvas { width: 100%; height: 100%; display: block; }
        
        #ui { 
            padding: 10px; 
            padding-bottom: 35px;
            background: #050505; 
            border-top: 1px solid #111; 
            position: relative;
        }
        
        textarea { 
            width: 100%; background: transparent; color: #00ff00; border: none; 
            font-family: 'VT323', sans-serif; font-size: 18px; outline: none; resize: none; 
            height: 80px;
            max-height: 35vh;
            overflow-y: auto;
        }

        textarea::-webkit-scrollbar {
            width: 14px;
        }
        textarea::-webkit-scrollbar-track {
            background: #020202; 
            border-left: 1px solid #111;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #003300; 
            border: 1px solid #00ff00;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #005500; 
        }

        #error-display {
            position: absolute;
            bottom: 8px;
            left: 10px;
            right: 10px;
            color: #ff3333; 
            font-family: 'VT323', sans-serif;
            font-size: 18px;
            display: none; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        .btn { 
            cursor: pointer; user-select: none; transition: all 0.1s ease; white-space: nowrap;
            color: #00ff00; border: 1px solid #004400; background: transparent; text-decoration: none;
            text-transform: uppercase; border-radius: 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            padding: 0 10px;
            box-sizing: border-box;
            flex-shrink: 0; 
        }
        
        .btn:active { background: rgba(0,255,0,0.2); transform: scale(0.96); }
        .btn.active { background: rgba(0,255,0,0.08); border-color: #00ff00; }
        
        .btn-icon { 
            width: 38px; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            font-size: 18px; 
        }

        @media (min-width: 768px) {
            #container { width: 80%; height: 600px; }
            #header { flex-direction: row; justify-content: space-between; }
            .meta { text-align: left; }
            .controls { overflow-x: visible; }
            textarea { height: 120px; }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <div class="meta" id="status">BYTEBED</div>
            <div class="controls">
                <span id="play-btn" class="btn btn-icon" onclick="togglePlay(event)">▶&#xFE0E;</span>
                <span id="stop-btn" class="btn btn-icon" onclick="resetT(event)">▢&#xFE0E;</span>
                <span id="rate-btn" class="btn" onclick="cycleRate(event)">8000HZ</span>
                <span id="format-btn" class="btn active" onclick="toggleFormat(event)">BYTEBEAT</span>
                <span class="btn btn-icon" onclick="zoomIn(event)">＋&#xFE0E;</span>
                <span id="vis-btn" class="btn" onclick="toggleVis(event)">WAVEFORM</span>
                <span class="btn btn-icon" onclick="zoomOut(event)">－&#xFE0E;</span>
                <span id="mode-btn" class="btn active" onclick="toggleMode(event)">INFIX</span>
                <span id="btn-auto" class="btn active" onclick="toggleAuto(event)">AUTO</span>
                <span id="share-btn" class="btn btn-icon" onclick="shareCode(event)">↗&#xFE0E;</span>
            </div>
        </div>

        <div id="viz-wrapper">
            <canvas id="viz"></canvas>
        </div>

        <div id="ui">
            <textarea id="formula" spellcheck="false" placeholder="...">t * (t >> 8 | t >> 11)</textarea>
            <div id="error-display"></div>
        </div>
    </div>
    <script src="emulator.js"></script> 
</body>
</html>
